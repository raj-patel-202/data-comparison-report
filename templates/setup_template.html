<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Comparison Setup</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .col-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.4);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: var(--transition);
        }
        .col-checkbox:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--color-accent);
        }
    </style>
</head>
<body>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>
    <div class="app-wrapper">
        <header class="dashboard-header glass-panel">
            <div class="header-title" style="margin-bottom: 24px;">
                <h1 style="font-size: 1.8rem; letter-spacing: -0.5px;">DATA COMPARISON SETUP</h1>
            </div>
            <div class="report-overview">
                <h2 style="font-size: 1.125rem; font-weight: 700; margin-bottom: 8px; color: var(--color-text);">
                    Select Comparison Key(s)
                </h2>
                <p style="font-size: 0.9375rem; color: var(--color-text-secondary); margin-bottom: 24px;">
                    Select one or more columns to act as the primary key for reconciling the <strong>{{ dsn1 | title }}</strong> and <strong>{{ dsn2 | title }}</strong> datasets.
                </p>
                <form action="/generate_report" method="POST">
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px;">
                        {% for col in common_cols %}
                        <label class="col-checkbox">
                            <input type="checkbox" name="id_cols" value="{{ col }}">
                            <span style="font-weight: 500; font-size: 0.95rem; color: var(--color-text);">{{ col }}</span>
                        </label>
                        {% endfor %}
                    </div>
                    <button type="submit" class="glass-btn" style="padding: 12px 32px; font-size: 1rem; font-weight: 600; cursor: pointer; background: var(--color-accent); color: white; border: none; border-radius: var(--radius-sm); transition: var(--transition);">
                        Generate Report
                    </button>
                </form>
            </div>
        </header>
    </div>
</body>
</html>
